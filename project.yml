name: LivePhotoBatchConverter
options:
  bundleIdPrefix: com.livephoto
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: zh-Hans
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  LivePhotoBatchConverter:
    type: application
    platform: iOS
    sources:
      - path: LivePhotoBatchConverterApp.swift
      - path: Models
      - path: Views
      - path: ViewModels
      - path: Services
      - path: Utils
      - path: Resources/Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.livephoto.batchconverter
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGNING_ALLOWED: YES
