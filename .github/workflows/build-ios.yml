# GitHub Actions: 在 macOS 云服务器上编译 iOS 应用
#
# 编译后对 .app 进行 ad-hoc 签名，使爱思助手可以重签安装

name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: 编译 iOS 应用
    runs-on: macos-15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 XcodeGen
        run: brew install xcodegen

      - name: 选择 Xcode 16.x 稳定版本
        run: |
          echo "可用 Xcode 版本:"
          ls -d /Applications/Xcode*.app
          STABLE_XCODE=$(ls -d /Applications/Xcode_16.*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$STABLE_XCODE" ]; then
            STABLE_XCODE=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          fi
          if [ -z "$STABLE_XCODE" ]; then
            STABLE_XCODE=$(ls -d /Applications/Xcode*.app | grep -v "beta" | sort -V | tail -1)
          fi
          echo "选择: $STABLE_XCODE"
          sudo xcode-select -s "$STABLE_XCODE/Contents/Developer"
          xcodebuild -version

      - name: 生成 Xcode 项目
        run: xcodegen generate

      - name: 编译应用
        run: |
          xcodebuild build \
            -project LivePhotoBatchConverter.xcodeproj \
            -scheme LivePhotoBatchConverter \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS=""

      - name: Ad-hoc 签名并打包 IPA
        run: |
          APP_PATH="./build/Build/Products/Release-iphoneos/LivePhotoBatchConverter.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "❌ 找不到 .app 文件"
            find ./build -name "*.app" -type d 2>/dev/null
            exit 1
          fi

          echo "=== 签名前 .app 内容 ==="
          ls -la "$APP_PATH"
          echo ""

          # Ad-hoc 签名（使用 - 表示无证书签名）
          # 这会创建 _CodeSignature 目录，爱思助手可以替换为 Apple ID 签名
          echo "=== 执行 ad-hoc 签名 ==="
          codesign --force --deep --sign - "$APP_PATH" 2>&1
          echo "签名退出码: $?"

          # 验证签名
          echo ""
          echo "=== 验证签名 ==="
          codesign -vvv "$APP_PATH" 2>&1 || true
          echo ""

          # 检查 _CodeSignature 是否生成
          if [ -d "$APP_PATH/_CodeSignature" ]; then
            echo "✅ _CodeSignature 目录已生成"
            ls -la "$APP_PATH/_CodeSignature"
          else
            echo "❌ _CodeSignature 目录未生成，手动创建"
            mkdir -p "$APP_PATH/_CodeSignature"
          fi

          echo ""
          echo "=== Info.plist 内容 ==="
          plutil -p "$APP_PATH/Info.plist"
          echo ""

          # 打包 IPA
          echo "=== 打包 IPA ==="
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/

          zip -qr LivePhotoBatchConverter.ipa Payload

          echo ""
          echo "=== IPA 文件信息 ==="
          ls -lh LivePhotoBatchConverter.ipa
          echo ""
          echo "=== IPA 内容结构 ==="
          unzip -l LivePhotoBatchConverter.ipa
          echo ""
          echo "=== _CodeSignature 内容 ==="
          unzip -p LivePhotoBatchConverter.ipa "Payload/LivePhotoBatchConverter.app/_CodeSignature/CodeResources" 2>/dev/null | head -20 || echo "CodeResources 未找到"

      - name: 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: LivePhotoBatchConverter-ipa
          path: LivePhotoBatchConverter.ipa
          retention-days: 30

      - name: 编译完成
        run: |
          echo "✅ 编译完成！"
          echo "📦 IPA 已生成（含 ad-hoc 签名）"
          echo "📱 下载后用爱思助手签名安装"
