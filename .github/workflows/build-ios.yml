# GitHub Actions: 在 macOS 云服务器上编译 iOS 应用
#
# 触发条件：
#   1. 手动触发（在 GitHub 仓库页面点击 Actions → Build iOS IPA → Run workflow）
#   2. 推送代码到 main 分支时自动触发
#
# 编译产物：
#   生成未签名的 IPA 文件，下载后通过爱思助手签名安装到 iPhone

name: Build iOS IPA

on:
  # 推送到 main 分支时自动编译
  push:
    branches: [ main ]
  # 支持手动触发
  workflow_dispatch:

jobs:
  build:
    name: 编译 iOS 应用
    runs-on: macos-15

    steps:
      # 1. 检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 安装 XcodeGen
      - name: 安装 XcodeGen
        run: brew install xcodegen

      # 3. 选择 Xcode 16.x 稳定版本（避免 beta SDK 兼容性问题）
      - name: 选择 Xcode 版本
        run: |
          echo "可用 Xcode 版本:"
          ls -d /Applications/Xcode*.app
          # 优先选择 Xcode 16.x（稳定版），避免 beta 版本
          STABLE_XCODE=$(ls -d /Applications/Xcode_16.*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$STABLE_XCODE" ]; then
            STABLE_XCODE=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          fi
          if [ -z "$STABLE_XCODE" ]; then
            echo "未找到 Xcode 16.x，使用默认 Xcode"
            STABLE_XCODE=$(ls -d /Applications/Xcode*.app | grep -v "beta" | sort -V | tail -1)
          fi
          echo "选择: $STABLE_XCODE"
          sudo xcode-select -s "$STABLE_XCODE/Contents/Developer"
          xcodebuild -version
          echo "SDK 版本:"
          xcodebuild -showsdks | grep iphoneos

      # 4. 生成 Xcode 项目
      - name: 生成 Xcode 项目
        run: xcodegen generate

      # 5. 编译应用（不签名，后续由爱思助手签名）
      - name: 编译应用
        run: |
          xcodebuild build \
            -project LivePhotoBatchConverter.xcodeproj \
            -scheme LivePhotoBatchConverter \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS=""

      # 6. 检查编译产物并打包 IPA
      - name: 检查产物并打包 IPA
        run: |
          # 检查 .app 是否存在
          APP_PATH="./build/Build/Products/Release-iphoneos/LivePhotoBatchConverter.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ 错误：找不到 .app 文件"
            echo "构建产物目录内容:"
            find ./build/Build/Products -type f 2>/dev/null || echo "目录不存在"
            exit 1
          fi

          # 显示 .app 包内容
          echo "=== .app 包内容 ==="
          ls -la "$APP_PATH"
          echo ""
          echo "=== Info.plist 内容 ==="
          plutil -p "$APP_PATH/Info.plist"
          echo ""

          # 检查必需文件
          echo "=== 完整性检查 ==="
          if [ -f "$APP_PATH/LivePhotoBatchConverter" ]; then
            echo "✅ 可执行文件存在"
          else
            echo "❌ 可执行文件缺失"
            exit 1
          fi
          if [ -f "$APP_PATH/Info.plist" ]; then
            echo "✅ Info.plist 存在"
          else
            echo "❌ Info.plist 缺失"
            exit 1
          fi

          # 打包 IPA
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qr LivePhotoBatchConverter.ipa Payload
          echo ""
          echo "=== IPA 文件信息 ==="
          ls -lh LivePhotoBatchConverter.ipa
          echo ""
          echo "=== IPA 内容结构 ==="
          unzip -l LivePhotoBatchConverter.ipa | head -20

      # 7. 上传 IPA 构建产物
      - name: 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: LivePhotoBatchConverter-ipa
          path: LivePhotoBatchConverter.ipa
          retention-days: 30

      # 8. 编译完成通知
      - name: 编译完成
        run: |
          echo "✅ 编译完成！"
          echo "📦 IPA 文件已生成，请在 Actions 页面下载"
          echo "📱 下载后使用爱思助手签名安装到 iPhone"
